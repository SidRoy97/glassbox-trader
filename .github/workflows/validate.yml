name: validate
on:
  workflow_dispatch:

permissions:
  contents: read
  models: read   # lets the github_models seat work even via github.token later

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: deps
        run: pip install requests python-dotenv transformers torch --index-url https://pypi.org/simple --extra-index-url https://download.pytorch.org/whl/cpu
      - name: bench smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python - <<'EOF'
          from engine.llm_clients import ask, parse_json_reply, BENCH
          print("bench active:", BENCH)
          assert len(BENCH) == 3, f"expected 3 bench providers, got {BENCH}"
          for p in BENCH:
              raw = ask(p, 'Reply with exactly this JSON and nothing else: {"ok": true}')
              parsed = parse_json_reply(raw, ["ok"])
              print(f"{p}: raw={str(raw)[:70]!r} parsed={parsed}")
              assert parsed and parsed.get("ok") is True, f"{p} failed"
          print("ALL THREE BENCH PROVIDERS PASS")
          EOF
      - name: finbert smoke test
        run: |
          python - <<'EOF'
          from transformers import pipeline
          fb = pipeline("text-classification", model="ProsusAI/finbert", top_k=None)
          for text in ["Company beats estimates and raises guidance",
                       "Company warns of weak demand, cuts outlook"]:
              s = {d["label"]: round(d["score"], 3) for d in fb(text)[0]}
              print(text, "->", s)
          print("FINBERT LOADS AND SCORES")
          EOF