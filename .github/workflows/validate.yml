name: validate
on:
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
      GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests python-dotenv
      - name: bench smoke test
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python - <<'EOF'
          import time
          from engine.llm_clients import ask, parse_json_reply, BENCH, FALLBACK_ORDER
          print("priority line:", FALLBACK_ORDER)
          print("bench active:", BENCH)
          ok, soft = [], []
          for p in BENCH:
              raw = None
              for attempt in range(2):   # one transient-429 tolerance
                  raw = ask(p, 'Reply with exactly this JSON: {"ok": true}')
                  if raw:
                      break
                  time.sleep(30)
              parsed = parse_json_reply(raw, ["ok"])
              print(f"{p}: parsed={parsed}")
              if parsed and parsed.get("ok") is True:
                  ok.append(p)
              else:
                  soft.append(p)   # rate-limited now, not broken
          print(f"\nWORKING: {ok}")
          print(f"RATE-LIMITED (retry later, not a failure): {soft}")
          assert ok, "no bench provider worked at all — check keys"
          print("VALIDATION OK — at least one bench provider confirmed live")
          EOF